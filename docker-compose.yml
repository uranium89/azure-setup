services:
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    restart: always
    user: root
    environment:
      # General
      HOST: 0.0.0.0
      PORT: 3100
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}

      # Data storage (Standard path for Paperclip)
      HOME: /paperclip
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: ${PAPERCLIP_INSTANCE_ID:-default}
      
      # Agent Configuration (OpenCode)
      PAPERCLIP_AGENT_OPENCODE_ENABLED: "true"
      PAPERCLIP_AGENT_OPENCODE_BINARY: /usr/local/bin/opencode
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/app/cli/bin

      # Secrets
      PAPERCLIP_SECRETS_MASTER_KEY: ${PAPERCLIP_SECRETS_MASTER_KEY}
      PAPERCLIP_SECRETS_STRICT_MODE: ${PAPERCLIP_SECRETS_STRICT_MODE:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:-${BETTER_AUTH_SECRET}}

      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # Telemetry
      PAPERCLIP_TELEMETRY_DISABLED: 1
    volumes:
      - ./data:/paperclip
    depends_on:
      paperclip-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paperclip_net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${PROTO}
      - NODE_ENV=production
      - WEBHOOK_URL=${PROTO}://${DOMAIN}:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - paperclip_net

  paperclip-init:
    image: alpine
    container_name: paperclip_init
    user: root
    volumes:
      - ./data:/paperclip
    command: chmod 700 /paperclip/instances/default/db
    networks:
      - paperclip_net

  nginx:
    image: nginx:1.27-alpine
    container_name: paperclip_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - paperclip_net

networks:
  paperclip_net:
    driver: bridge
