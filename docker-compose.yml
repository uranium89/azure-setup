services:
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    restart: always
    user: root
    environment:
      # General
      HOST: 0.0.0.0
      PORT: 3100
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}

      # Data storage (Standard path for Paperclip)
      HOME: /paperclip
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: ${PAPERCLIP_INSTANCE_ID:-default}
      
      # Agent Configuration (OpenCode)
      PAPERCLIP_AGENT_OPENCODE_ENABLED: "true"
      PAPERCLIP_AGENT_OPENCODE_BINARY: /usr/local/bin/opencode
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/app/cli/bin

      # Secrets
      PAPERCLIP_SECRETS_MASTER_KEY: ${PAPERCLIP_SECRETS_MASTER_KEY}
      PAPERCLIP_SECRETS_STRICT_MODE: ${PAPERCLIP_SECRETS_STRICT_MODE:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:-${BETTER_AUTH_SECRET}}

      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # Telemetry
      PAPERCLIP_TELEMETRY_DISABLED: 1
    volumes:
      - ./data:/paperclip
    expose:
      - "3100"
    networks:
      - paperclip_net

  nginx:
    image: nginx:1.27-alpine
    container_name: paperclip_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - paperclip
    networks:
      - paperclip_net

networks:
  paperclip_net:
    driver: bridge
