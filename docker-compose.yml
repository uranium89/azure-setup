# =============================================================================
# Paperclip – Docker Compose (Production)
# Mode: authenticated + public (internet-facing, login required)
# Agent: OpenCode (opencode_local adapter)
# =============================================================================
# Sao chép .env.example → .env rồi điền các giá trị, sau đó chạy:
#   docker compose up -d
# =============================================================================

services:
  # ── Paperclip app ─────────────────────────────────────────────────────────
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip
    user: root
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${PAPERCLIP_PORT:-3100}
      NODE_ENV: production

      # Deployment mode
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}

      # Data storage (inside container – mapped via volume)
      HOME: /paperclip-data
      PAPERCLIP_HOME: /paperclip-data
      PAPERCLIP_INSTANCE_ID: ${PAPERCLIP_INSTANCE_ID:-default}
      
      # Kích hoạt OpenCode Agent và ép đường dẫn PATH
      PAPERCLIP_AGENT_OPENCODE_ENABLED: "true"
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/app/cli/bin

      # Secrets
      PAPERCLIP_SECRETS_MASTER_KEY: ${PAPERCLIP_SECRETS_MASTER_KEY}
      PAPERCLIP_SECRETS_STRICT_MODE: ${PAPERCLIP_SECRETS_STRICT_MODE:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:-${BETTER_AUTH_SECRET}}

      # Telemetry
      PAPERCLIP_TELEMETRY_DISABLED: ${PAPERCLIP_TELEMETRY_DISABLED:-1}

      # LLM API keys (cho claude/codex adapters nếu dùng)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/paperclip-data
    expose:
      - "${PAPERCLIP_PORT:-3100}"
    networks:
      - paperclip_net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: paperclip_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    networks:
      - paperclip_net
    depends_on:
      - paperclip

  # ── Certbot (Let's Encrypt) ────────────────────────────────────────────────
  # Chạy một lần để lấy cert, sau đó tự renew qua cron hoặc deploy timer.
  # Nếu dùng IP (không có domain), comment block này lại.
  certbot:
    image: certbot/certbot:latest
    container_name: paperclip_certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - paperclip_net

networks:
  paperclip_net:
    driver: bridge
